{% extends 'readquest/base_no-authenticate.html' %}
{% load static %}


{% block title_block %}
Welcome
{% endblock %}


{% block body_block %}
<div class="container">
    <div class="row">
        <div class="col-md-8">
            <img src="{%static 'images/front_page_library.jpg'%}" class="col-md-12" id="front_image">
        </div>
        <div class="col-md-4 card-custom card-body p-4 text-center align-items-center justify-content-center ">
            <div class="d-flex align-items-center justify-content-center p-4">

                <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3">

                <h1 class="brand-title">Welcome Back</h1>
            </div>
            <div class="align-items-center justify-content-center p-4">
                <p class="text-center">ReadQuest will help you keep track of your reading progress.</p>
                </div>

            <div class="d-flex flex-column align-items-center w-100">
                    <button id="btn-register" class="button btn py-2 fs-6 mt-3 w-100" type="button">Register for ReadQuest</button>
                    <button id="btn-login" class="button btn py-2 fs-6 mt-3 w-100" type="button">Log In</button>
                </div>

                <script>
                    $("#btn-register").click(function () {
                        window.location.href = "{% url 'readquest:register' %}";
                    });
                    $("#btn-login").click(function () {
                        window.location.href = "{% url 'readquest:login' %}";
                    });
                </script>
        </div>
            
    </div>
</div>
</div>

{% endblock %}
