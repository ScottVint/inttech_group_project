{% extends 'readquest/base_no-authenticate.html' %}
{% load static %}


{% block title_block %}
Welcome
{% endblock %}


{% block body_block %}
<div class="container">
    <div class="row">
        <div class="col-md-8">
            <img src="{%static 'images/front_page_library.jpg'%}" class="col-md-12" id="front_image">
        </div>
        <div class="col-md-4 card-custom card-body p-4 text-center align-items-center justify-content-center ">
            <div class="d-flex align-items-center justify-content-center p-4">

                <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3">

                <h1 class="brand-title">Welcome Back</h1>
            </div>
            <div class="align-items-center justify-content-center p-4">
                <p class="text-center">ReadQuest will help you keep track of your reading progress.</p>
                </div>

                <div>
                    <form id="login_form" method="post" action="{% url 'readquest:login' %}">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="User Name" required>
                            <label for="username">User Name</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <button class="btn w-100 py-2 fs-6 text-white button" type="submit">
                            Log In
                        </button>

                        <div class="mt-4 text-center">
                            <small class="text-muted">Don't have an account? <a href="{% url 'readquest:register' %}" style="color: #F98410; font-weight: 500;" class="text-decoration-none">Register here</a></small>
                        </div>
                    </form>
                </div>
            <!-- <div class="d-flex justify-content-center align-items-center">
                <div class="col-md-12">
                    <button class="button btn py-2 fs-6 mt-3 col-md-12" type="button"> Register for
                        ReadQuest</button>
                    <button class="button btn py-2 fs-6 mt-3 col-md-10" type="button">Log in</button> -->
            </div>
        </div>
            
    </div>
</div>
</div>

{% endblock %}
