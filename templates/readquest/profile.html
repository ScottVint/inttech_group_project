{% extends 'readquest/base_authenticate.html' %}
{% load static %}

{% block title_block %}
Profile
{% endblock %}


{% block body_block %}

<h1>Your Profile</h1>
      

<div class="container">
    <div class="row mt-4 g-4">

        <!-- Current Read -->
        <div class="col-12 col-md-8">
            <div class="p-4 base_cards">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="mb-0">Current read</h2>
                    <button class="button btn p-2">Add new book +</button>
                </div>

                <!-- Inner Darker Card -->
                <div class="dark_card p-4 d-flex align-items-end">

                    <div class="book_cover_profile me-3">
                        <img>
                    </div>

                    <div class="flex-grow-1">
                        <h3 class="mb-3">Book Title</h3>



                         <!-- Progress bar -->
                        <div class="progress mb-3">
                            <div class="progress-bar" role="progressbar" style="width:45%" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
                                45%
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button class="button btn">Update progress</button>
                            <button class="button btn">Finished book</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Current Goal -->
        <div class="col-12 col-md-4">
            <div class="p-4 base_cards">
                <h2>Current goal</h2>
            </div>
        </div>

    </div>
</div>
{% endblock %}
