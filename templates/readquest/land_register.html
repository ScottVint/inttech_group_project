{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To ReadQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .card-custom {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }
        .logo-img {
            max-width: 150px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="vh-100 d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-custom p-4">
                <div class="card-body text-center">

                    <img src="{% static 'readquest/images/logo.png' %}" alt="ReadQuest Logo" class="logo-img">

                    <h3 class="mb-4">Join ReadQuest</h3>

                    <form id="user_form" method="post" action="" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="form-floating mb-3 text-start">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Please Input Your User Name" required>
                            <label for="username">User Name</label>
                        </div>

                        <div class="form-floating mb-4 text-start">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Please Input The Password" required>
                            <label for="password">Password</label>
                        </div>

                        <button class="btn btn-primary w-100 py-2" type="submit">Register Now</button>

                        <div class="mt-3">
                            <small class="text-muted">Already had an account? <a href="#" class="text-decoration-none">click here to log in</a></small>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
