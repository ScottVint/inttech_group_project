{% load static %}
{% load readquest_template_tags %}
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'CSS/style.css' %}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>ReadQuest -
        {% block title_block %}

        {% endblock %}
    </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');
    </style>
</head>


<body class="body-background">

    <header>

        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container align-items-center">

                <div class="container d-flex">

                    <div class="d-flex align-items-center">
                        <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" id="logo_auth_page"
                            class="p-2 navbar-brand">
                    </div>

                    <button class="navbar-toggler" type="button" data-toggle="collapse"
                        data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="navbar-collapse collapse justify-content-between">
                        
                            <ul class="nav navbar-nav">
                                <li class="nav-item p-4 ">Home</li>
                                <li class="nav-item p-4">Profile</li>
                                <li class="nav-item p-4">Goals</li>
                                <li class="nav-item p-4">Catalogue</li>
                            </ul>
                        
                            <form class="d-flex align-items-center me-2">
                                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                                <button class="btn btn-outline-success" type="submit">Search</button>
                            </form>

                    </div>
                    <div class="d-flex justify-content-between align-items-center ml-4">
                        <img src="{% static 'images/profile.png' %}" alt="Profile icon" id="profile_img" class="ml-4">
                    </div>

                </div>
            </div>
        </nav>

    </header>

    <!-- Page specific content goes here -->
    {% block body_block %}

    {% endblock %}
</body>

</html>
