{% load static %}
{% load readquest_template_tags %}
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'CSS/style.css' %}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>ReadQuest -
        {% block title_block %}

        {% endblock %}
    </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');
    </style>
</head>


<body class="body-background">

    <!-- Page specific content goes here -->

    <header>

        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container justify-content-between">
                <div class="col-4">
                    <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3 navbar-brand">
                </div>
                <div class="navbar-collapse  ">
                    <ul class="navbar-nav nav">
                        <li class="nav-item ">Home</li>
                        <li class="nav-item">Profile</li>
                        <li class="nav-item">Goals</li>
                        <li class="nav-item">Catalogue</li>
                    </ul>
                </div>
                <div>
                    <form class="d-flex">
                        <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
                    </form>
                </div>
                <div class="col-1">
                    <img src="{% static 'images/profile.png' %}" alt="Profile icon" id="profile_img">
                </div>

            </div>
        </nav>

    </header>

    {% block body_block %}
    hello
    {% endblock %}
</body>

</html>
