{% extends 'readquest/base_no-authenticate.html' %}
{% load static %}

{% block title_block %}
Log in
{% endblock %}

{% block body_block %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card card-custom p-4 p-md-5">
                <div class="card-body p-0">

                    <div class="d-flex align-items-center justify-content-center header-container">
                        <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3">
                        <h1 class="brand-title">Welcome Back</h1>
                    </div>

                    <form id="login_form" method="post" action="{% url 'readquest:login' %}">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="User Name" required>
                            <label for="username">User Name</label>
                        </div>

                        <div class="form-floating mb-2">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <div class="form-check mb-2 text-start">
                            <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                            <label class="form-check-label text-muted" for="remember_me" style="font-size: 0.9rem;">
                                Remember me
                            </label>
                        </div>

                        <button class="btn w-100 py-2 fs-6 text-white button" type="submit">
                            Log In
                        </button>

                        <div class="mt-4 text-center">
                            <small class="text-muted">Don't have an account? <a href="{% url 'readquest:index' %}" style="color: #F98410; font-weight: 500;" class="text-decoration-none">Register here</a></small>
                        </div>
                    </form>

                </div>
            </div>
            <button id="btn-back-home-login" class="btn w-100 py-2 fs-6 text-white button mt-3" type="button">
                Back to Homepage
            </button>
            <script>
                $("#btn-back-home-login").click(function () {
                    window.location.href = "{% url 'readquest:index' %}";
                });
            </script>
        </div>
    </div>
</div>

{% endblock %}
