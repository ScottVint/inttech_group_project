{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to ReadQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'CSS/style.css' %}" rel="stylesheet" > 
    
</head>
<body class="vh-100 d-flex align-items-center justify-content-center body-background">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card card-custom p-4 p-md-5">
                <div class="card-body p-0">

                    <div class="d-flex align-items-center justify-content-center header-container">
                        <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3">
                        <h2 class="brand-title">Welcome Back</h2>
                    </div>

                    <form id="login_form" method="post" action="{% url 'readquest:login' %}">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="User Name" required>
                            <label for="username">User Name</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <button class="btn w-100 py-2 fs-6 text-white" style="background-color: #F98410; border: none; font-weight: 500;" type="submit">
                            Log In
                        </button>

                        <div class="mt-4 text-center">
                            <small class="text-muted">Don't have an account? <a href="{% url 'readquest:register' %}" style="color: #F98410; font-weight: 500;" class="text-decoration-none">Register here</a></small>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
