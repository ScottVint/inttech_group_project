{% extends 'readquest/base_authenticate.html' %}
{% load static %}

{% block title_block %}
Home
{% endblock %}


{% block body_block %}


<div class="container p-0">
    <div class="row mt-2 p-0 g-4">

        <!-- Community Updates -->
        <div class="col-12 col-md-8">
            <div class="p-4 base_cards">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="mb-0">Community updates</h2>
                </div>

                <!-- Inner Darker Card -->
                <div class="dark_card p-4 d-flex align-items-end">

                    <div class="book_cover_profile me-3">
                        <img>
                    </div>


                    <div class="flex-grow-1">
                        <i class="bi bi-person profile_icon"></i>
                        <h3 class="mb-3">Book Title</h3>
                        <h3 class="mb-3">Author</h3>
                        

                        <!-- Progress bar -->
                        <div class="progress" style="height: 28px;">
                            <div class="progress-bar" role="progressbar" style="width:45%;" aria-valuenow="45"
                                aria-valuemin="0" aria-valuemax="100">
                                45%
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>


    
      <div class="col-12 col-md-4">
        <div>
            <div class="p-4 base_cards">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="mb-0">Your current read</h2>
                </div>
            </div>
        </div>

         <div>
            <div class="p-4 base_cards mt-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="mb-0">Your current goal</h2>
                </div>
            </div>
        </div>
    </div>
</div>
</div>



{% endblock %}
