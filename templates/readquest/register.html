{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ReadQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'CSS/style.css' %}" rel="stylesheet" > 
</head>
<body class="vh-100 d-flex align-items-center justify-content-center body-background">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card card-custom p-4 p-md-5">
                <div class="card-body p-0">

                    <div class="d-flex align-items-center justify-content-center header-container">
                        <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3">
                        <h2 class="brand-title">Join ReadQuest</h2>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger text-center py-2 mb-3" style="font-size: 0.9rem;" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form id="user_form" method="post" action="" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="User Name" required>
                            <label for="username">User Name</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email Address" required>
                            <label for="email">Email Address</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <div class="form-floating mb-1">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                            <label for="confirm_password">Confirm Password</label>
                        </div>

                        <div class="mb-4 ps-1">
                            <small class="text-muted" style="font-size: 0.8rem;">
                                * Password must be at least 8 characters long.
                            </small>
                        </div>

                        <button class="btn w-100 py-2 fs-6 text-white button" type="submit">
                            Register Now
                        </button>

                        <div class="mt-4 text-center">
                            <small class="text-muted">Already have an account? <a href="{% url 'readquest:login' %}" style="color: #F98410; font-weight: 500;" class="text-decoration-none">Log in here</a></small>
                        </div>
                    </form>

                </div>
            </div>
            <button class="btn w-100 py-2 fs-6 button mt-3" type="submit">
                            Back to Homepage
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
