{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ReadQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }
        .card-custom {
            background-color: #FFEBD7;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border: none;
        }
        .header-container {
            margin-bottom: 30px;
        }
        .logo-img {
            height: 55px;
            width: auto;
            object-fit: contain;
        }
        .brand-title {
            color: #6a2c28;
            font-weight: 600;
            font-size: 1.8rem;
            margin: 0;
        }
        .form-floating > label {
            color: #6c757d;
        }
    </style>
</head>
<body class="vh-100 d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card card-custom p-4 p-md-5">
                <div class="card-body p-0">

                    <div class="d-flex align-items-center justify-content-center header-container">
                        <img src="{% static 'images/logo.jpg' %}" alt="ReadQuest Logo" class="logo-img me-3">
                        <h2 class="brand-title">Join ReadQuest</h2>
                    </div>

                    <form id="user_form" method="post" action="" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="User Name" required>
                            <label for="username">User Name</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email Address" required>
                            <label for="email">Email Address</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <div class="form-floating mb-1">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                            <label for="confirm_password">Confirm Password</label>
                        </div>

                        <div class="mb-4 ps-1">
                            <small class="text-muted" style="font-size: 0.8rem;">
                                * Password must be at least 8 characters long.
                            </small>
                        </div>

                        <button class="btn w-100 py-2 fs-6 text-white" style="background-color: #F98410; border: none; font-weight: 500;" type="submit">
                            Register Now
                        </button>

                        <div class="mt-4 text-center">
                            <small class="text-muted">Already have an account? <a href="#" style="color: #F98410; font-weight: 500;" class="text-decoration-none">Log in here</a></small>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
